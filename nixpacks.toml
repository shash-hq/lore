[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "composer", "nodejs_20"]

[phases.build]
cmds = ["composer install --no-dev", "npm ci", "npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"