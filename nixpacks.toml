[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "composer", "nodejs_20"]

[phases.build]
cmds = ["composer install --no-dev", "npm ci", "npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
